          type: string
          description: ISO country code.
          example: US
        latitude:
          type: number
          description: Latitude of the airport in decimal degrees.
          example: 37.6188
        longitude:
          type: number
          description: Longitude of the airport in decimal degrees.
          example: -122.375
        altitude:
          type: number
          description: Field elevation / altitude of the airport in feet.
          example: 13
        faaLid:
          type: string
          description: FAA Location Identifier (LID).
