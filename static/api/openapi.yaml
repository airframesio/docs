    MarineVoyagePosition:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the voyage position report.
          example: '987654'
        vessel:
          description: The vessel that reported this position.
          allOf:
            - $ref: '#/components/schemas/MarineVessel'
        voyage:
          description: The voyage this position report belongs to.
          allOf:
            - $ref: '#/components/schemas/MarineVoyage'
        message:
          description: The AIS message this position was derived from.
          allOf:
            - $ref: '#/components/schemas/MarineMessage'
        latitude:
          type: string
          description: Latitude of the reported position (decimal degrees).
          example: '30.5852'
        longitude:
          type: string
          description: Longitude of the reported position (decimal degrees).
          example: '32.3286'
        rateOfTurn:
          type: number
          description: Rate of turn in degrees per minute (positive = turning to starboard).
          example: 0
        speedOverGround:
          type: number
          description: Speed over ground in knots.
          example: 12.3
        courseOverGround:
          type: number
          description: Course over ground in degrees (0-359).
          example: 187.5
        trueHeading:
          type: number
          description: True heading of the vessel in degrees (0-359).
          example: 188
        positionAccuracy:
          type: boolean
          description: Position accuracy flag (true = high accuracy, e.g. DGPS within 10m).
          example: true
        createdAt:
          format: date-time
          type: string
          description: Timestamp when the position report was recorded.
          example: '2024-06-01T11:58:00.000Z'
      required:
        - id
        - latitude
        - longitude
        - createdAt
    MarineVoyage:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the voyage.
          example: '67890'
        vessel:
          description: The vessel associated with this voyage.
          allOf:
            - $ref: '#/components/schemas/MarineVessel'
        messages:
          description: AIS messages received during this voyage.
          type: array
          items:
            $ref: '#/components/schemas/MarineMessage'
        positions:
          description: Position reports recorded during this voyage.
          type: array
          items:
            $ref: '#/components/schemas/MarineVoyagePosition'
        lastPosition:
          description: The most recent position report for this voyage.
          allOf:
            - $ref: '#/components/schemas/MarineVoyagePosition'
        lastHeardAt:
          format: date-time
          type: string
          description: Timestamp when the vessel was last heard on this voyage.
          example: '2024-06-01T11:58:00.000Z'
        lastLatitude:
          type: string
          description: Latitude of the last reported position (decimal degrees).
          example: '30.5852'
        lastLongitude:
          type: string
          description: Longitude of the last reported position (decimal degrees).
          example: '32.3286'
        status:
          type: string
          description: Current status of the voyage.
