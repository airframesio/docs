        createdAt:
          format: date-time
          type: string
          description: Timestamp when the voyage record was created.
          example: '2024-05-20T06:00:00.000Z'
        updatedAt:
          format: date-time
          type: string
          description: Timestamp when the voyage record was last updated.
          example: '2024-06-01T12:00:00.000Z'
