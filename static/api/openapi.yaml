          format: date-time
          type: string
          description: Timestamp when the message record was created.
          example: '2024-06-01T11:58:01.000Z'
        updatedAt:
          format: date-time
          type: string
          description: Timestamp when the message record was last updated.
          example: '2024-06-01T11:58:01.000Z'
