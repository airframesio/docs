components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-API-KEY
    oauth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: /oauth/token
          scopes:
            airframes: Read access to airframes
            airports: Read access to airports
            airlines: Read access to airlines
            fixes: Read access to fixes
            leaderboards: Read access to leaderboards
            messages: Read access to messages
            messages:decodings: Read access to message decodings
            stations: Read access to public stations information

  schemas:
    Airframe:
      type: object
      properties:
        id:
          type: integer
        tail:
          type: string
        icao:
          type: string
        iata:
          type: string
        manufacturer:
          type: string
        manufacturerModel:
          type: string
        owner:
          type: string
        operator:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Airline:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        icao:
          type: string
        iata:
          type: string
        prefix:
          type: string
        callsign:
          type: string
        addressLine1:
          type: string
        addressLine2:
          type: string
        city:
          type: string
        region:
          type: string
        postalCode:
          type: string
        country:
          type: string
        phoneCountryCode:
          type: string
        phone:
          type: string
        email:
          type: string
        logoUrl:
          type: string
        websiteUrl:
          type: string
        facebookUrl:
          type: string
        youtubeUrl:
          type: string
        linkedinUrl:
          type: string
        instagramUrl:
          type: string
        createdAt:
          type: string
