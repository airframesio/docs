    User:
      type: object
      properties: {}
    Station:
      type: object
      properties:
        id:
          type: number
          description: Auto-generated primary key for the station.
          example: 1234
        uuid:
          type: string
          description: Stable UUID identifying the station across systems.
          example: b3c1e2f4-5a6b-4c7d-8e9f-0a1b2c3d4e5f
        ident:
          type: string
          description: Human-readable station identifier (callsign/handle).
          example: KSEA-1
        type:
          type: string
          description: Station type classification.
          example: ground
        ipAddress:
          type: string
          description: Source IP address of the station. Masked when serialized to API consumers.
          example: 203.0.113.0
        leaderboardRanks:
          description: Leaderboard rank rows associated with this station.
          type: array
          items:
            $ref: '#/components/schemas/LeaderboardRank'
        messages:
          description: Messages received by this station.
          type: array
          items:
            $ref: '#/components/schemas/Message'
        stationMessageCount:
          description: Aggregated lifetime message count record for this station.
          allOf:
            - $ref: '#/components/schemas/StationMessageCount'
        messagesCount:
          type: number
          description: Lifetime message count, hydrated from stationMessageCount after load.
          example: 1582940
        airframes:
          description: Airframes this station has received messages from.
          type: array
          items:
            $ref: '#/components/schemas/Airframe'
        sourceApplication:
          type: string
          description: Application that produced the station feed.
          example: acarsdec
        sourceType:
          type: string
          description: Source data type for the station feed.
          example: acars
        sourceProtocol:
          type: string
          description: Source protocol used to deliver messages.
          example: udp
        userId:
          type: string
          description: ID of the user that owns this station.
          example: a1b2c3d4-0000-0000-0000-000000000001
        user:
          description: Owning user. Sensitive fields are stripped before serialization.
          allOf:
            - $ref: '#/components/schemas/User'
        latitude:
          type: string
          description: >-
            Effective latitude served to clients (resolved in afterLoad from user/geoip/fuzzed
            source).
          example: '47.4502'
        longitude:
          type: string
          description: >-
            Effective longitude served to clients (resolved in afterLoad from user/geoip/fuzzed
            source).
          example: '-122.3088'
        geoipLatitude:
          type: string
          description: Latitude derived from GeoIP lookup of the station IP.
          example: '47.4502'
        geoipLongitude:
          type: string
          description: Longitude derived from GeoIP lookup of the station IP.
          example: '-122.3088'
        userLatitude:
          type: string
          description: Latitude explicitly provided by the station owner.
          example: '47.4502'
        userLongitude:
          type: string
          description: Longitude explicitly provided by the station owner.
          example: '-122.3088'
        fuzzedLatitude:
          type: string
          description: Privacy-fuzzed latitude used when use_fuzzed_location is enabled.
          example: '47.45'
        fuzzedLongitude:
          type: string
          description: Privacy-fuzzed longitude used when use_fuzzed_location is enabled.
          example: '-122.31'
        useFuzzedLocation:
          type: boolean
          description: Whether the fuzzed (privacy) location should be used instead of exact coordinates.
          example: false
        altitude:
          type: number
          description: Antenna altitude in meters above sea level.
          example: 120
        nearestAirportIcao:
          type: string
          description: ICAO code of the airport nearest to the station.
          example: KSEA
        description:
          type: string
          description: Free-text description of the station.
          example: Rooftop ACARS receiver near Seattle
        systemPlatform:
          type: string
          description: Hardware/system platform the station runs on.
          example: Raspberry Pi 4
        systemOS:
          type: string
          description: Operating system the station runs.
          example: DietPi (Debian 12)
        equipmentSdr:
          type: string
          description: SDR hardware used by the station.
          example: RTL-SDR Blog V3
        equipmentFilters:
          type: string
          description: RF filters in the receive chain.
          example: FlightAware 1090 MHz bandpass
        equipmentAntenna:
          type: string
          description: Antenna used by the station.
          example: Discone 25-1300 MHz
        countryCode:
          type: string
          description: ISO 3166-1 country code of the station location.
          example: US
        countryName:
          type: string
          description: Country name of the station location.
          example: United States
        flagEmoji:
          type: string
          description: Emoji flag for the station country.
          example: 🇺🇸
        flagImageUrl:
          type: string
          description: URL to a flag image for the station country.
          example: https://airframes.io/flags/us.svg
        status:
          type: string
          description: Current station status.
          example: active
        flagged:
          type: boolean
          description: Whether the station has been flagged for review.
          example: false
          default: false
        flaggedReason:
          type: string
          description: Reason the station was flagged, if any.
          example: Suspected spoofed positions
          nullable: true
        flaggedAt:
          format: date-time
          type: string
          description: Timestamp the station was flagged, if any.
          example: '2026-02-14T08:30:00.000Z'
          nullable: true
        blocked:
          type: boolean
          description: Whether the station is blocked from feeding data.
          example: false
          default: false
        lastReportAt:
          format: date-time
          type: string
          description: Timestamp of the most recent report from the station.
          example: '2026-06-05T12:00:00.000Z'
        createdAt:
          format: date-time
          type: string
          description: Timestamp the station record was created.
          example: '2025-01-10T09:15:00.000Z'
        updatedAt:
          format: date-time
          type: string
          description: Timestamp the station record was last updated.
          example: '2026-06-05T12:00:00.000Z'
        circles:
          type: object
          description: >-
            GeoJSON FeatureCollection of range-ring coverage circles (50/100/150/200nm), populated
            on single-station lookups.
        coverage:
          type: object
          description: GeoJSON coverage polygon, populated on single-station lookups.
        polarCoverage:
          type: object
          description: Polar histogram of coverage by bearing (currently unused / reserved).
        recentMessages:
          description: Recent messages associated with the station, when included.
          type: array
          items:
            type: array
      required:
        - id
        - uuid
        - ident
        - type
        - ipAddress
        - sourceApplication
        - sourceType
        - sourceProtocol
        - userId
        - useFuzzedLocation
        - altitude
        - nearestAirportIcao
        - description
        - systemPlatform
        - systemOS
        - equipmentSdr
        - equipmentFilters
        - equipmentAntenna
        - countryCode
        - countryName
        - flagEmoji
        - flagImageUrl
        - status
        - flagged
        - blocked
        - createdAt
        - updatedAt
