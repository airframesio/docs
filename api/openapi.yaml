            example: '2026-06-08T00:00:00Z'
            type: string
        - name: since
          required: false
          in: query
          description: ISO-8601 lower time bound (alias for created_at_after). Defaults to 24h ago.
          schema:
            example: '2026-06-01T00:00:00Z'
            type: string
        - name: text
          required: false
          in: query
          description: Substring to match case-insensitively (ILIKE) within the message text.
          schema:
            example: TURBULENCE
            type: string
        - name: icao
          required: false
          in: query
          description: ICAO hex code; matched case-insensitively (ILIKE) on from_hex.
          schema:
            example: a1b2c3
            type: string
        - name: exclude_errors
          required: false
          in: query
          description: Comma-separated list of error counts to exclude.
          schema:
            example: 1,2,3
            type: string
        - name: exclude_labels
          required: false
          in: query
          description: Comma-separated list of message labels to exclude.
          schema:
            example: Q0,SA
            type: string
        - name: labels
          required: false
          in: query
          description: Comma-separated list of message labels to include.
          schema:
            example: H1,5Z
            type: string
        - name: station_ids
          required: false
          in: query
          description: Comma-separated list of station ids to filter by.
          schema:
            example: 11,22,33
            type: string
        - name: flight_id
          required: false
          in: query
          description: Restrict results to a single flight id.
          schema:
            example: 123456
            type: number
        - name: airframe_ids
          required: false
          in: query
          description: Comma-separated list of airframe ids to filter by.
          schema:
            example: 101,202,303
            type: string
        - name: timeframe
          required: false
          in: query
          description: Relative time window for the query. Overrides created_at_after when supplied.
          schema:
            enum:
              - last-hour
              - last-6-hours
              - last-12-hours
              - last-day
              - last-3-days
              - last-week
              - last-month
              - last-3-months
            type: string
        - name: created_at_after
          required: false
          in: query
          description: >-
            ISO-8601 date/time lower bound; only messages created at or after this instant are
            returned. Defaults to now minus one day. Overridden by timeframe when both are supplied.
