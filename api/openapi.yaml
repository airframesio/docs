        distanceNm:
          type: number
          description: Great-circle distance in nautical miles.
          example: 2235.4
        initialBearing:
          type: number
          description: Initial true bearing in degrees (0–360).
          example: 273.1
        pointCount:
          type: number
          description: Number of points returned.
          example: 65
        points:
          description: Interpolated great-circle points (departure → destination).
          type: array
          items:
            $ref: '#/components/schemas/RoutePointDto'
      required:
        - from
        - to
        - distanceNm
        - initialBearing
        - pointCount
        - points
    FlightRouteResponseDto:
      type: object
      properties:
        flightId:
          type: number
          description: Flight id.
          example: 5544014689
        source:
          type: string
          description: >-
            Where the route came from: `flown` = actual ADS-B track from positions; `great_circle` =
            synthesized departure→destination great-circle line (no positions available); `none` =
            no route could be derived.
          enum:
            - flown
            - great_circle
            - none
          example: flown
        departure:
          type: string
          description: Departure airport ICAO, when known.
          example: KSFO
          nullable: true
        destination:
          type: string
          description: Destination airport ICAO, when known.
          example: KJFK
          nullable: true
        distanceNm:
          type: number
          description: Total route distance in nautical miles.
          example: 2235.4
          nullable: true
        pointCount:
          type: number
          description: Number of points in the route.
          example: 128
        points:
          description: Ordered route points.
          type: array
          items:
            $ref: '#/components/schemas/RoutePointDto'
      required:
        - flightId
        - source
        - pointCount
        - points
    LivePositionDto:
      type: object
      properties:
        lat:
          type: number
          description: Latitude in decimal degrees.
          example: 37.6188
        lon:
          type: number
          description: Longitude in decimal degrees.
          example: -122.3754
        alt:
          type: number
          description: Altitude in feet, when known.
          example: 35000
        speed:
          type: number
          description: Ground speed in knots, when known.
          example: 420
        heading:
          type: number
          description: Magnetic heading in degrees (0–359), when known.
          example: 270
        track:
          type: number
          description: Track over ground in degrees (0–359), when known.
          example: 268
        timestamp:
          type: number
          description: Observation timestamp in epoch milliseconds.
          example: 1717459200000
        source:
          type: string
          description: Source that produced this position (e.g. the ingest feed).
          example: adsb
        confidence:
          type: string
          description: Confidence in the position (e.g. low, medium, high).
          example: high
        type:
          type: string
          description: Position type (e.g. observed, estimated).
          example: observed
      required:
        - lat
        - lon
        - timestamp
        - source
        - confidence
        - type
    LiveFlightDto:
      type: object
      properties:
        cacheId:
          type: string
          description: Entity cache ID of the live flight.
          example: A1B2C3
        transport:
          type: string
          description: Transport type of the entity (e.g. aircraft).
          example: aircraft
        hex:
          type: string
          description: ICAO 24-bit hex code of the aircraft.
          example: a1b2c3
        tail:
          type: string
          description: Tail / registration of the aircraft.
          example: N12345
        flightIcao:
          type: string
          description: ICAO flight number / callsign.
          example: SWA403
        flightIata:
          type: string
          description: IATA flight number.
          example: WN403
        flightRaw:
          type: string
          description: Raw flight callsign as decoded.
          example: SWA403
        departure:
          type: string
          description: Departure airport ICAO code.
          example: KLAX
        arrival:
          type: string
          description: Arrival airport ICAO code.
          example: KSFO
        status:
          type: string
          description: Entity status (e.g. active, gapped, ended).
          example: active
        source:
          type: string
          description: Last ingest source for the entity.
          example: adsb
        airframeId:
          type: string
          description: Airframe DB ID, if the entity has been synced.
          example: '987654'
        dbId:
          type: string
          description: Flight DB ID, if the entity has been synced.
          example: '123456'
        firstSeenAt:
          type: number
          description: First seen timestamp in epoch seconds.
          example: 1717459000
        lastSeenAt:
          type: number
          description: Last seen timestamp in epoch seconds.
          example: 1717459200
        position:
          description: Current position of the flight, or null if no position is available.
          nullable: true
