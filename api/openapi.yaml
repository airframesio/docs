          format: date-time
          type: string
          description: Timestamp when the airframe record was created.
          example: '2024-01-15T08:30:00.000Z'
        updatedAt:
          format: date-time
          type: string
          description: Timestamp when the airframe record was last updated.
          example: '2024-03-22T14:05:00.000Z'
      required:
        - id
        - tail
        - icao
        - iata
        - icaoType
        - description
        - manufacturer
        - manufacturerModel
        - owner
        - createdAt
        - updatedAt
