    get:
      description: >-
        Returns a paginated list of decoded aviation messages (ACARS, VDL, HFDL, etc.) matching the
        supplied query parameters. Authentication is optional: providing a valid JWT or API key
        honors authenticated rate limits, but anonymous requests are also permitted. This endpoint
