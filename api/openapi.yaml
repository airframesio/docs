info:
  title: Airframes API
  description: >-
    Aviation data — ACARS, VDL, HFDL and SATCOM messages, flights, airframes, airlines, airports and
    station telemetry — aggregated and processed by Airframes, supported by a global network of
    community feeder stations.


    All endpoints are served under the `/v1` prefix (e.g. `https://api.airframes.io/v1/flights`).
    For backward compatibility the same endpoints also respond without the prefix, but `/v1` is the
    documented, stable path and should be preferred.


    **Pagination** — list endpoints accept `limit`/`offset` (or `page`/`limit`, or cursor
    `before_id`) and return pagination metadata in response headers: `X-Total-Count` (when known),
    `X-Result-Count`, and `X-Page`/`X-Per-Page`/`X-Total-Pages` for paged endpoints.


    **Time ranges** — time-filtered list endpoints accept `since` and `until` (ISO-8601).


    **Rate limits** — responses carry `X-RateLimit-Limit`, `X-RateLimit-Remaining` and
    `X-RateLimit-Reset` (and `Retry-After` on 429). Every response includes an `X-Request-ID` for
    support.
  version: '1.0'
  contact:
    name: Airframes
    url: https://airframes.io/
    email: kevin@airframes.io
  termsOfService: https://docs.airframes.io/api/terms
tags: []
servers:
  - url: https://api.airframes.io
    description: Production
  - url: https://staging.airframes.io
    description: Staging
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
      description: Airframes API key as a bearer token (af_...)
    api-key:
      type: apiKey
      in: header
      name: x-api-key
  schemas:
    RegisterDto:
      type: object
      properties: {}
    ConfirmDto:
      type: object
