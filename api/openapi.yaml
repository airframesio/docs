openapi: 3.0.0
paths:
  /v1/health:
    get:
      description: >-
        Runs liveness and readiness checks for the API: PostgreSQL connectivity, Redis connectivity,
        process heap and RSS memory usage, and (in production) disk space. Returns an aggregated
        health report.
      operationId: check
      parameters: []
      responses:
        '200':
          description: >-
            All health indicators are up. Returns a Terminus health-check result with status "ok"
            and per-indicator details (e.g. db_master, redis, api_memory_heap, api_memory_rss,
            api_disk_space).
        '429': &ref_1
          description: >-
            Rate limit exceeded (60 requests/min per client IP by default; some endpoints override
            this). See the X-RateLimit-* and Retry-After headers.
          headers:
            Retry-After:
              description: Seconds to wait before retrying.
              schema:
                type: integer
            X-RateLimit-Limit:
              description: Request quota for the current window.
              schema:
                type: integer
            X-RateLimit-Remaining:
              description: Requests remaining in the current window.
              schema:
                type: integer
            X-RateLimit-Reset:
              description: Seconds until the window resets.
              schema:
                type: integer
          content: &ref_0
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '503':
          description: >-
            One or more health indicators are down. Returns a Terminus health-check result with
            status "error" and the failing indicator details.
      summary: Service health check
      tags:
        - Health
  /v1/acars/decode:
    post:
      description: >-
        Decodes the raw text of an ACARS message for the given ACARS label and returns the decoded
        structured payload. The shape of the response depends on the message label and content.
      operationId: decode
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DecodeAcarsDto'
      responses:
        '201':
          description: The decoded ACARS message payload. Structure varies by label and message content.
        '401': &ref_2
          description: Authentication required or the credentials are invalid.
          content: *ref_0
        '429': *ref_1
      security:
        - api-key: []
        - bearer: []
      summary: Decode an ACARS message
      tags:
        - ACARS
  /v1/airlines:
    get:
      description: Returns a paginated list of airlines. Results are cached for 6 hours.
      operationId: findAll
      parameters:
        - name: sort
          required: false
          in: query
          description: Field to sort by. Prefix with `-` for descending order. Defaults to `icao`.
          schema:
            example: icao
        - name: limit
          required: false
          in: query
          description: Maximum number of airlines per page. Defaults to 100.
          schema:
            example: 100
            type: number
        - name: page
          required: false
          in: query
          description: Page number for pagination (1-based). Defaults to 1.
          schema:
            example: 1
            type: number
      responses:
        '200':
          description: A paginated array of airlines.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Airline'
        '401': *ref_2
        '429': *ref_1
      security: &ref_3
        - api-key: []
        - bearer: []
      summary: List airlines
      tags: &ref_4
        - Airlines
  /v1/airlines/{id}:
    get:
      description: Returns a single airline by its database ID. Result is cached for 6 hours.
      operationId: findOne
      parameters:
        - name: id
          required: true
          in: path
          description: Database ID of the airline.
          schema:
            example: '42'
            type: string
      responses:
        '200':
          description: The matching airline, or empty if not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Airline'
        '401': *ref_2
        '429': *ref_1
      security: *ref_3
      summary: Get airline by ID
      tags: *ref_4
  /v1/airlines/icao/{icao}:
    get:
      description: >-
        Returns a single airline matching the given 3-letter ICAO airline code. Result is cached for
        6 hours.
      operationId: findOneByIcao
      parameters:
        - name: icao
          required: true
          in: path
          description: ICAO airline code (3 letters).
          schema:
            example: UAL
            type: string
      responses:
        '200':
          description: The matching airline, or empty if not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Airline'
        '401': *ref_2
        '429': *ref_1
      security: *ref_3
      summary: Get airline by ICAO code
      tags: *ref_4
  /v1/airlines/iata/{iata}:
    get:
      description: >-
        Returns all airlines matching the given 2-character IATA airline code. Results are cached
        for 6 hours.
      operationId: findAllByIata
      parameters:
        - name: iata
          required: true
          in: path
          description: IATA airline code (2 characters).
          schema:
            example: UA
            type: string
      responses:
        '200':
          description: An array of airlines matching the IATA code.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Airline'
        '401': *ref_2
        '429': *ref_1
      security: *ref_3
      summary: List airlines by IATA code
      tags: *ref_4
  /v1/airframes/routes:
    get:
      description: >-
        Returns the great-circle path between two airports (resolved by ICAO, ident or IATA), as an
        interpolated list of points plus distance and initial bearing. Useful for drawing a
        planned/idealized route.
      operationId: greatCircleRoute
      parameters:
        - name: from
          required: true
          in: query
          description: Departure airport (ICAO, ident or IATA).
          schema:
            example: KSFO
            type: string
        - name: to
          required: true
          in: query
          description: Destination airport (ICAO, ident or IATA).
          schema:
            example: KJFK
            type: string
        - name: points
          required: false
          in: query
          description: >-
            Number of interpolation segments (1–1000, default 64). The response contains points + 1
            entries.
          schema:
            example: 64
            type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GreatCircleRouteResponseDto'
        '400':
          description: Missing `from`/`to`.
        '401': *ref_2
        '404':
          description: Unknown airport.
        '429': *ref_1
      security: &ref_5
        - api-key: []
        - bearer: []
      summary: Great-circle route between two airports
      tags: &ref_6
        - Routes
  /v1/airframes/flights/{id}/route:
    get:
      description: >-
        Returns a flight's route. When ADS-B positions exist, this is the actual flown track
        (`source: "flown"`); otherwise it falls back to a synthesized great-circle line between the
        departure and destination airports (`source: "great_circle"`). If neither is available,
        `source: "none"` with an empty `points` array.
      operationId: flightRoute
      parameters:
        - name: id
          required: true
          in: path
          description: Numeric flight id.
          schema:
            example: 5544014689
            type: string
        - name: hours
          required: false
          in: query
          description: Window (hours) for the flown track (default 48).
          schema:
            example: 48
            type: string
        - name: limit
          required: false
          in: query
          description: Max flown points to return (default 2000).
          schema:
            example: 2000
            type: string
        - name: points
          required: false
          in: query
          description: Segments for the great-circle fallback (1–1000, default 64).
          schema:
            example: 64
            type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlightRouteResponseDto'
        '401': *ref_2
        '404':
          description: Flight not found.
        '429': *ref_1
      security: *ref_5
      summary: Route for a flight
      tags: *ref_6
  /v1/flights:
    get:
      description: >-
        Returns the most recent flights from the database. The result count is clamped between 1 and
        500 (defaults to 100).
      operationId: findAll
      parameters:
        - name: limit
          required: false
          in: query
          description: Maximum number of flights to return (clamped to 1–500).
          schema:
            example: 100
            type: string
      responses:
        '200':
          description: An array of the most recent flights.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Flight'
        '429': *ref_1
      summary: List recent flights
      tags: &ref_7
        - Flights
  /v1/flights/active:
    get:
      description: >-
        Returns currently active flights, served from a short-lived Redis cache when available.
        Requires authentication via JWT or API key. Arbitrary query parameters are passed through as
        filters.
      operationId: findActive
      parameters:
        - name: dep_airport
          required: false
          in: query
          description: Filter to flights departing from this airport ICAO code.
          schema:
            example: KLAX
            type: string
        - name: arr_airport
          required: false
          in: query
          description: Filter to flights arriving at this airport ICAO code.
          schema:
            example: KSFO
            type: string
      responses:
        '200':
          description: An array of active flights.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Flight'
        '401': *ref_2
        '429': *ref_1
      security:
        - api-key: []
        - bearer: []
      summary: List active flights
      tags: *ref_7
  /v1/flights/active/{id}:
    get:
      description: >-
        Returns a single active flight by its numeric id, served from a short-lived Redis cache when
        available.
      operationId: findOneActive
      parameters:
        - name: id
          required: true
          in: path
          description: Numeric flight id.
          schema:
            example: 123456
            type: string
      responses:
        '200':
          description: The matching active flight (or null if not found).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Flight'
        '429': *ref_1
      summary: Get an active flight by id
      tags: *ref_7
  /v1/flights/live:
    get:
      description: >-
        Returns all live aircraft flights directly from the Redis entity cache with no database
        query — suitable for real-time map UIs. Requires authentication via JWT or API key.
      operationId: findLive
      parameters:
        - name: withPosition
          required: false
          in: query
          description: Set to "true" to only return flights that currently have a position.
          schema:
            example: 'true'
            type: string
        - name: limit
          required: false
          in: query
          description: Maximum number of flights to return (default 5000, clamped to 1–10000).
          schema:
            example: 5000
            type: string
      responses:
        '200':
          description: An array of live flights from the entity cache (not a persisted entity shape).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LiveFlightDto'
        '401': *ref_2
        '429': *ref_1
      security:
        - api-key: []
        - bearer: []
      summary: List live flights from cache
      tags: *ref_7
  /v1/flights/live/{cacheId}:
    get:
      description: >-
        Returns a single live flight, including its full position trail, from the Redis entity
        cache. Returns null if the flight is not in the cache. Requires authentication via JWT or
        API key.
      operationId: findOneLive
      parameters:
        - name: cacheId
          required: true
          in: path
          description: Entity cache id of the live flight.
          schema:
            example: A1B2C3
            type: string
      responses:
        '200':
          description: >-
            The live flight with an optional trail array, or null if not cached (not a persisted
            entity shape).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiveFlightDto'
        '401': *ref_2
        '429': *ref_1
      security:
        - api-key: []
        - bearer: []
      summary: Get a live flight with trail
      tags: *ref_7
  /v1/flights/{id}/messages:
    get:
      description: >-
        Returns paginated messages for a flight. Page size is capped at 100, and the lookup can be
        bounded to a recent window to prune partitions and speed up the query.
      operationId: findMessages
      parameters:
        - name: id
          required: true
          in: path
          description: Numeric flight id.
          schema:
            example: 123456
            type: string
        - name: page
          required: false
          in: query
          description: Page number, 1-based (default 1).
          schema:
            example: 1
            type: string
        - name: limit
          required: false
          in: query
          description: Messages per page (default 100, capped at 100).
          schema:
            example: 100
            type: string
        - name: sinceHours
          required: false
          in: query
          description: Restrict to messages within the last N hours to prune partitions and speed up the query.
          schema:
            example: 24
            type: string
      responses:
        '200':
          description: A paginated set of messages for the flight.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
        '429': *ref_1
      summary: List messages for a flight
      tags: *ref_7
  /v1/flights/{id}/events:
    get:
      description: >-
        Returns flight events, capped and time-bounded, served from a short-lived Redis cache when
        available. Loaded independently by the flight detail UI.
      operationId: findEvents
      parameters:
        - name: id
          required: true
          in: path
          description: Numeric flight id.
          schema:
            example: 123456
            type: string
      responses:
        '200':
          description: An array of flight events.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FlightEvent'
        '429': *ref_1
      summary: List events for a flight
      tags: *ref_7
  /v1/flights/{id}/positions:
    get:
      description: >-
        Returns recent flight positions for the map, capped and time-bounded, served from a
        short-lived Redis cache when available. Degrades to an empty array instead of failing if the
        positions query errors (e.g. a statement timeout).
      operationId: findPositions
      parameters:
        - name: id
          required: true
          in: path
          description: Numeric flight id.
          schema:
            example: 123456
            type: string
        - name: hours
          required: false
          in: query
          description: Restrict positions to the last N hours.
          schema:
            example: 6
            type: string
      responses:
        '200':
          description: An array of recent flight positions (empty if the query degrades).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FlightPosition'
        '429': *ref_1
      summary: List positions for a flight
      tags: *ref_7
  /v1/flights/{id}:
    get:
      description: >-
        Returns flight detail including airframe, airline, events, and recent messages (bounded to a
        recent window). Positions are not joined by default — fetch them from /flights/:id/positions
        — unless include=positions is passed. Served from a Redis cache with a short TTL for
        in-flight flights and a longer TTL for completed ones.
      operationId: findOne
      parameters:
        - name: id
          required: true
          in: path
          description: Numeric flight id.
          schema:
            example: 123456
            type: string
        - name: include
          required: false
          in: query
          description: >-
            Comma-separated list of extra relations to load inline. Pass "positions" to also load
            positions inline (legacy globe/map callers).
          schema:
            example: positions
            type: string
      responses:
        '200':
          description: The flight detail with related airframe, airline, and events.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Flight'
        '429': *ref_1
      summary: Get flight detail by id
      tags: *ref_7
  /v1/flights/bbox/{xmin},{ymin},{xmax},{ymax}:
    get:
      description: >-
        Returns flights whose position falls within the given geographic bounding box. Returns an
        empty array if any bound is infinite. Requires authentication via JWT or API key.
      operationId: findByBoundingBox
      parameters:
        - name: xmin
          required: true
          in: path
          description: Minimum longitude of the bounding box.
          schema:
            example: '-122.5'
            type: string
        - name: ymin
          required: true
          in: path
          description: Minimum latitude of the bounding box.
          schema:
            example: '37.2'
            type: string
        - name: xmax
          required: true
          in: path
          description: Maximum longitude of the bounding box.
          schema:
            example: '-121.8'
            type: string
        - name: ymax
          required: true
          in: path
          description: Maximum latitude of the bounding box.
          schema:
            example: '37.9'
            type: string
      responses:
        '200':
          description: An array of flights within the bounding box.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Flight'
        '401': *ref_2
        '429': *ref_1
      security:
        - api-key: []
        - bearer: []
      summary: List flights within a bounding box
      tags: *ref_7
  /v1/airframes:
    get:
      description: >-
        Returns a paginated list of airframes (aircraft). Supports optional filtering by tail number
        and airline. Results are cached for 1 hour.
      operationId: findAll
      parameters:
        - name: airlineId
          required: false
          in: query
          description: Filter airframes by the owning airline ID.
          schema:
            example: '42'
        - name: tail
          required: false
          in: query
          description: Filter airframes by tail (registration) number (prefix match).
          schema:
            example: N12345
        - name: sort
          required: false
          in: query
          description: >-
            Field to sort by. Prefix with `-` for descending order (e.g. `-icao`). Defaults to
            `icao`.
          schema:
            example: icao
        - name: limit
          required: false
          in: query
          description: Maximum number of airframes per page. Defaults to 100.
          schema:
            example: 100
            type: number
        - name: page
          required: false
          in: query
          description: Page number for pagination (1-based). Defaults to 1.
          schema:
            example: 1
            type: number
      responses:
        '200':
          description: A paginated array of matching airframes.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Airframe'
        '401': *ref_2
        '429': *ref_1
      security: &ref_8
        - api-key: []
        - bearer: []
      summary: List airframes
      tags: &ref_9
        - Airframes
  /v1/airframes/{id}:
    get:
      description: Returns a single airframe by its numeric database ID. Result is cached for 1 hour.
      operationId: findOne
      parameters:
        - name: id
          required: true
          in: path
          description: Numeric database ID of the airframe.
          schema:
            example: '12345'
            type: string
      responses:
        '200':
          description: The matching airframe, or empty if not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Airframe'
        '401': *ref_2
        '429': *ref_1
      security: *ref_8
      summary: Get airframe by ID
      tags: *ref_9
  /v1/airframes/tail/{tail}:
    get:
      description: >-
        Returns a single airframe matching the given tail (registration) number. Result is cached
        for 1 hour.
      operationId: findOneByTail
      parameters:
        - name: tail
          required: true
          in: path
          description: Tail (registration) number of the airframe.
          schema:
            example: N12345
            type: string
      responses:
        '200':
          description: The matching airframe, or empty if not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Airframe'
        '401': *ref_2
        '429': *ref_1
      security: *ref_8
      summary: Get airframe by tail number
      tags: *ref_9
  /v1/airframes/icao/{icao}:
    get:
      description: >-
        Returns a single airframe matching the given ICAO 24-bit address / code. Result is cached
        for 1 hour.
      operationId: findOneByIcao
      parameters:
        - name: icao
          required: true
          in: path
          description: ICAO code of the airframe.
          schema:
            example: A12B34
            type: string
      responses:
        '200':
          description: The matching airframe, or empty if not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Airframe'
        '401': *ref_2
        '429': *ref_1
      security: *ref_8
      summary: Get airframe by ICAO code
      tags: *ref_9
  /v1/airframes/iata/{iata}:
    get:
      description: Returns a single airframe matching the given IATA code. Result is cached for 1 hour.
      operationId: findOneByIata
      parameters:
        - name: iata
          required: true
          in: path
          description: IATA code of the airframe.
          schema:
            example: '320'
            type: string
      responses:
        '200':
          description: The matching airframe, or empty if not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Airframe'
        '401': *ref_2
        '429': *ref_1
      security: *ref_8
      summary: Get airframe by IATA code
      tags: *ref_9
  /v1/airports:
    get:
      description: Returns a paginated list of airports, ICAO-ordered. Results are cached for 6 hours.
      operationId: findAll
      parameters:
        - name: limit
          required: false
          in: query
          description: Maximum number of airports per page. Defaults to 100.
          schema:
            example: 100
            type: number
        - name: page
          required: false
          in: query
          description: Page number for pagination (1-based). Defaults to 1.
          schema:
            example: 1
            type: number
      responses:
        '200':
          description: A paginated array of airports (ICAO-ordered).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Airport'
        '401': *ref_2
        '429': *ref_1
      security: &ref_10
        - &ref_12
          api-key: []
        - &ref_13
          bearer: []
      summary: List airports
      tags: &ref_11
        - Airports
  /v1/airports/{id}:
    get:
      description: >-
        Returns a single airport by its UUID. The ID must be a valid UUID or a 400 is returned.
        Result is cached for 6 hours.
      operationId: findOne
      parameters:
        - name: id
          required: true
          in: path
          description: UUID of the airport.
          schema:
            example: 6c2e9f1a-1b2c-4d3e-8f9a-0b1c2d3e4f5a
            type: string
      responses:
        '200':
          description: The matching airport, or empty if not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Airport'
        '400':
          description: The provided ID is not a valid UUID.
        '401': *ref_2
        '429': *ref_1
      security: *ref_10
      summary: Get airport by ID
      tags: *ref_11
  /v1/airports/icao/{icao}:
    get:
      description: >-
        Returns a single airport matching the given 4-letter ICAO airport code. Result is cached for
        6 hours.
      operationId: findOneByIcao
      parameters:
        - name: icao
          required: true
          in: path
          description: ICAO airport code (4 letters).
          schema:
            example: KSFO
            type: string
      responses:
        '200':
          description: The matching airport, or empty if not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Airport'
        '401': *ref_2
        '429': *ref_1
      security: *ref_10
      summary: Get airport by ICAO code
      tags: *ref_11
  /v1/airports/iata/{iata}:
    get:
      description: >-
        Returns a single airport matching the given 3-letter IATA airport code. Result is cached for
        6 hours.
      operationId: findOneByIata
      parameters:
        - name: iata
          required: true
          in: path
          description: IATA airport code (3 letters).
          schema:
            example: SFO
            type: string
      responses:
        '200':
          description: The matching airport, or empty if not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Airport'
        '401': *ref_2
        '429': *ref_1
      security: *ref_10
      summary: Get airport by IATA code
      tags: *ref_11
