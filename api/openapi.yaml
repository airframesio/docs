openapi: 3.0.3
info:
  version: 0.0.1
  title: Airframes REST API
  contact:
    name: Kevin Elliott
    email: kevin@airframes.io
    url: "https://airframes.io/"
  description: >-
    Aviation data aggregated and processed by Airframes, supported by community feeder stations.
  termsOfService: "https://docs.airframes.io/api/terms"
  x-categpry: "Aviation"
  x-logo:
    url: "https://airframes.io/images/logo.png"
    altText: "Airframes"
  x-website: "https://airframes.io/"
  x-twitter: "https://twitter.com/airframesio"
  x-github: "https://github.com/airframesio"
  x-badges:
    - name: "API Type"
      value: "REST"
    - name: "Region"
      value: "Global"
x-gateways:
  - url: rapidapi.com

tags:
  - name: "General"
  - name: "Authentication"
  - name: "Airframes API"
  - name: "Airlines API"
  - name: "Airports API"
  - name: "Feeders API"
  - name: "Flights API"
  - name: "Messages API"
  - name: "Routes API"
  - name: "Stations API"

servers:
  - url: "http://localhost:8080"
    description: Local Development Server
  - url: "https://staging.airframes.io/{basePath}"
    description: Staging Server
    variables:
      basePath:
        default: v1
  - url: "https://api.airframes.io/{basePath}"
    description: Production Server
    variables:
      basePath:
        default: v1
  - url: "https://rapidapi.airframes.io"
    description: Production API for RapidAPI Users

paths:
  # Authentication endpoints
  /:
    get:
      summary: "API Root"
      description: "Returns a welcome message"
      tags:
        - General
      responses:
        "200":
          description: Welcome message
          content:
            text/plain:
              schema:
                type: string
                example: "Hello World!"
  
  /auth/login:
    post:
      summary: "User Login"
      description: "Authenticate user and return JWT token"
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
              required:
                - username
                - password
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
        "401":
          description: Unauthorized
  
  /auth/register:
    post:
      summary: "User Registration"
      description: "Register a new user account"
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                username:
                  type: string
      responses:
        "201":
          description: Registration successful
        "400":
          description: Bad request
  
  /auth/confirm:
    post:
      summary: "Confirm Email"
      description: "Confirm user email with token"
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                token:
                  type: string
      responses:
        "200":
          description: Email confirmed
        "400":
          description: Invalid token
  
  /auth/resend-confirmation-email:
    post:
      summary: "Resend Confirmation Email"
      description: "Resend email confirmation"
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Email sent
  
  /auth/reset-password:
    post:
      summary: "Reset Password"
      description: "Request password reset"
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Reset email sent
  
  /auth/reset-password/confirm:
    post:
      summary: "Confirm Password Reset"
      description: "Confirm password reset with token"
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                token:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Password reset successful
        "400":
          description: Invalid token

  # Airframes API
  /airframes:
    get:
      name: "Search Airframes"
      summary: "Search Airframes"
      description: "Search Airframes with optional filtering and pagination"
      tags:
        - Airframes API
      parameters:
        - name: tail
          in: query
          required: false
          schema:
            type: string
          description: Filter by tail number
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/page"
      operationId: getAirframes
      responses:
        "200":
          description: A list of Airframes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Airframe"
      security:
        - apiKey: []
        - oauth2:
            - airframes
  /airframes/{id}:
    get:
      summary: "Find an Airframe by ID"
