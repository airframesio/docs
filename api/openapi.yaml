          description: Manufacturer of the radiosonde.
          example: Vaisala
        status:
          type: string
          description: Current status of the radiosonde record.
          example: active
        flights:
          description: Flights flown by this radiosonde.
          type: array
          items:
            $ref: '#/components/schemas/SondeFlight'
        messages:
          description: Telemetry messages received from this radiosonde.
          type: array
          items:
            $ref: '#/components/schemas/SondeMessage'
        createdAt:
          format: date-time
          type: string
          description: Timestamp when the radiosonde record was created.
          example: '2024-06-01T05:00:00.000Z'
        updatedAt:
          format: date-time
          type: string
          description: Timestamp when the radiosonde record was last updated.
          example: '2024-06-01T06:30:00.000Z'
      required:
        - id
        - serial
        - createdAt
        - updatedAt
